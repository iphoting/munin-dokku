name: 'deploy'

on:
  push:
    branches:
      - master
      - dokku
      - "dokku**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cloning repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up SSH and push to dokku
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<'EOF'
          Host dokku-ssh.iphoting.cc
            ProxyCommand docker run --rm -i cloudflare/cloudflared:latest access ssh --hostname %h
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 20
          EOF
          git remote add dokku ssh://dokku@dokku-ssh.iphoting.cc/munin
          git push dokku HEAD:master --force
